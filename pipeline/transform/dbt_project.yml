name: "rosetta"
version: "1.0.0"
config-version: 2

profile: "rosetta"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]

models:
  rosetta:
    staging:
      +materialized: view
      +schema: staging          # -> jason_chletsos_rosetta_staging
    marts:
      +materialized: table
      +schema: marts            # -> jason_chletsos_rosetta_marts
      +contract:
        enforced: true          # marts publish an enforced schema contract

# Keep the jason_chletsos_ prefix on every schema dbt builds.
# The target schema is jason_chletsos_rosetta (set in profiles), and the
# custom schemas above append to it: _staging, _marts.
